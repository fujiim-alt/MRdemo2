<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>地下AR表示</title>

  <script
    type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f2f2f2;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: #f2f2f2;
    }

    .ar-button {
      position: absolute;
      left: 50%;
      bottom: 18vh;
      transform: translateX(-50%);
      padding: 14px 26px;
      border: none;
      border-radius: 999px;
      background: #111;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      z-index: 999;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
    }
  </style>
</head>

<body>
  <model-viewer
    src="./underground_45x16_marker_v2.glb"
    alt="地下構造物AR表示"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    touch-action="pan-y"
    shadow-intensity="0"
    exposure="1"
    environment-image="neutral"
    placement="floor">

    <button slot="ar-button" class="ar-button">
      ARで表示
    </button>
  </model-viewer>
</body>
</html>
