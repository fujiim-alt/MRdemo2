<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>地下AR表示</title>

  <script
    type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f2f2f2;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: #f2f2f2;
    }

    /*
      AR開始ボタン
      bottom: 22vh; で、スマホの下端からかなり上に表示します。
    */
    .ar-button {
      position: absolute;
      left: 50%;
      bottom: 22vh;
      transform: translateX(-50%);
      padding: 14px 24px;
      border: none;
      border-radius: 999px;
      background: #111;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      z-index: 999;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
    }

    .panel {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.18);
      font-size: 14px;
      line-height: 1.5;
      z-index: 10;
    }

    .title {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .note {
      color: #444;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <model-viewer
    src="./underground_45x16_marker_v2.glb"
    alt="地下構造物AR表示"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    touch-action="pan-y"
    shadow-intensity="0"
    exposure="1"
    environment-image="neutral"
    placement="floor">

    <button slot="ar-button" class="ar-button">
      ARで表示
    </button>
  </model-viewer>

  <div class="panel">
    <div class="title">地下AR表示モデル</div>
    <div>底面：45m × 16m</div>
    <div>GL ～ -2.5m：薄い半透明</div>
    <div>GL -2.5m ～ -6.0m：濃い半透明</div>
    <div class="note">地表枠線・四隅十字マーカー付き</div>
  </div>
</body>
</html>
